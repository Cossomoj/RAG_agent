services:
  rag_service:
    container_name: rag_service
    working_dir: /app
    command: sh -c "uvicorn app.src.main_version.telegram_bot:app --reload --host 0.0.0.0 --port 8001 & uvicorn app.src.main_version.admin_panel:app --reload --host 0.0.0.0 --port 8088"
    volumes:
      - /home/user1/sqlite_data_rag/AI_agent.db:/app/src/main_version/AI_agent.db
    ports:
      - "8001:8001"  # Порт для FastAPI
      - "8000:8000"  # Порт для WebSocket
      - "8088:8088"  # Порт для админ-панели
    environment:
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY}
      - TELEGRAM_API_KEY=${TELEGRAM_API_KEY}
      - FEEDBACK_CHAT_ID=${FEEDBACK_CHAT_ID}
      - FEEDBACK_BOT_TOKEN=${FEEDBACK_BOT_TOKEN}
      - WEBSOCKET_URL=ws://127.0.0.1:8000/ws
    build:
      context: ./rag_service2
      dockerfile: Dockerfile
    restart: always
    networks:
      - app_network

  nginx:
    container_name: nginx_reverse_proxy
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - rag_service
    restart: always
    networks:
      - app_network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app_network

  monitor:
    container_name: monitor_service
    build: 
      context: ./monitor2
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - rag_service
    environment:
      - ALERT_BOT_TOKEN=${ALERT_BOT_TOKEN}
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
