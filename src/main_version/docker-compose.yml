version: '3.8'

services:
  rag_service:
    container_name: rag_service
    build:
      context: /home/user1/rag_service2
      dockerfile: Dockerfile
    volumes:
      - /home/user1/sqlite_data_rag/AI_agent.db:/app/src/main_version/AI_agent.db
      - /home/user1/sqlite_data_rag:/app/sqlite_data_rag
    ports:
      - "8001:8001"  # Порт для FastAPI
      - "8000:8000"  # Порт для WebSocket
    environment:
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY}
      - TELEGRAM_API_KEY=${TELEGRAM_API_KEY}
      - FEEDBACK_CHAT_ID=${FEEDBACK_CHAT_ID}
      - FEEDBACK_BOT_TOKEN=${FEEDBACK_BOT_TOKEN}
      - WEBSOCKET_URL=ws://127.0.0.1:8000/ws
      - PYTHONPATH=/app
    env_file:
      - /home/user1/.env
    restart: always
    networks:
      - app_network

  admin_panel:
    container_name: admin_panel
    build:
      context: /home/user1/admin
      dockerfile: Dockerfile
    volumes:
      - /home/user1/sqlite_data_rag:/app/sqlite_data_rag
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PYTHONPATH=/app
    env_file:
      - /home/user1/.env
    restart: always
    networks:
      - app_network

  nginx:
    container_name: nginx_reverse_proxy
    image: nginx:1.25.3-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/user1/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/user1/certbot/conf:/etc/letsencrypt
      - /home/user1/certbot/www:/var/www/certbot
    depends_on:
      - rag_service
      - admin_panel
    restart: always
    networks:
      - app_network

  certbot:
    image: certbot/certbot
    volumes:
      - /home/user1/certbot/conf:/etc/letsencrypt
      - /home/user1/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app_network

  monitor:
    container_name: monitor_service
    build:
      context: /home/user1/monitor2
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    env_file:
      - /home/user1/.env
    depends_on:
      - rag_service
      - admin_panel
    restart: always
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
