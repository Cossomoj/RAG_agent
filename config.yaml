# Централизованная конфигурация RAG Agent
# Используется всеми компонентами системы

# Базовые настройки
app:
  name: "RAG Agent"
  version: "1.0.0"
  environment: "development"  # development, production
  debug: true

# Пути и директории
paths:
  database: "src/main_version/AI_agent.db"
  rag_path: "src/main_version"
  logs_dir: "logs"
  docs_dir: "src/main_version/docs"
  txt_docs_dir: "src/main_version/txt_docs"

# Сетевые настройки
network:
  rag_service:
    host: "0.0.0.0"
    port: 8000
    websocket_url: "ws://127.0.0.1:8000/ws"
  
  webapp_api:
    host: "0.0.0.0" 
    port: 5001
    
  admin_panel:
    host: "0.0.0.0"
    port: 8002
    
  telegram_bot:
    cache_api_port: 8007

# Учетные данные админки
admin:
  username: "admin_tg_bot"
  password: "135beton531"

# Настройки базы данных
database:
  type: "sqlite"
  backup_enabled: true
  backup_interval_hours: 24
  max_backups: 7

# Настройки логирования
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  rotation_enabled: true
  max_file_size_mb: 100
  max_files: 10
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Настройки производительности
performance:
  cache_enabled: true
  cache_ttl_minutes: 60
  max_concurrent_requests: 10
  request_timeout_seconds: 30

# Настройки безопасности  
security:
  rate_limiting_enabled: false  # для development
  max_requests_per_minute: 60
  cors_enabled: true
  allowed_origins: ["http://localhost:3000", "http://localhost:5001"]

# Health check настройки
health_check:
  enabled: true
  interval_seconds: 30
  endpoints:
    - name: "rag_service"
      url: "http://localhost:8000/docs"
    - name: "webapp_api" 
      url: "http://localhost:5001/api/health"
    - name: "admin_panel"
      url: "http://localhost:8002/" 